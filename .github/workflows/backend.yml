name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'eslint.config.mjs'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JWT_ACCESS_TOKEN_SECRET: test_secret_key_123
      JWT_ACCESS_TOKEN_EXPIRATION_TIME: 15m
      JWT_REFRESH_TOKEN_SECRET: test_refresh_key_456
      JWT_REFRESH_TOKEN_EXPIRATION_TIME: 7d
      BCRYPT_SALT_ROUNDS: 10
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_USE_SSL: false
      MINIO_PUBLIC_URI: http://localhost:9000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run unit tests
        run: npm run test