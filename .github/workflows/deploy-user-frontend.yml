name: Deploy User Frontend to Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'user-frontend/**'
      - '.github/workflows/deploy-user-frontend.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IS_GITHUB_PAGES: true # Сообщаем Next.js, что это сборка для Pages
      NEXT_PUBLIC_IS_STATIC: true # Включаем режим моков для GitHub Pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: user-frontend/package-lock.json

      - name: Install dependencies
        run: cd user-frontend && npm ci

      - name: Build project
        run: cd user-frontend && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './user-frontend/out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4